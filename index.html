    <script>
      const videos = document.querySelectorAll('.anim');

      videos.forEach(video => {

        const inThreshold  = parseFloat(video.dataset.in)  ?? 0.6;
        const outThreshold = parseFloat(video.dataset.out) ?? 0;
        const delay        = parseInt(video.dataset.delay) ?? 0;
        const debug        = video.dataset.debug === "true";

        let timer = null;
        let playing = false;

        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {

            const ratio = entry.intersectionRatio;

            // 滑入播放
            if (ratio >= inThreshold && !playing) {

              clearTimeout(timer);

              timer = setTimeout(() => {
                video.play().catch(() => {});
                playing = true;
              }, delay);
            }

            // 滑出初始化
            if (ratio <= outThreshold && playing) {

              clearTimeout(timer);

              video.pause();
              video.currentTime = 0;
              playing = false;
            }

          });
        }, {
          threshold: buildThresholdArray(inThreshold, outThreshold)
        });

        observer.observe(video);

        // ===== Debug 線 =====
        if (debug) {

          // 原本：從底部往上算
          createViewportLine(video, inThreshold, 'lime', 'IN (bottom)', 'bottom');

          // 新增：從頂部往下算
          createViewportLine(video, inThreshold, 'cyan', 'IN (top)', 'top');

          if (outThreshold > 0) {
            createViewportLine(video, outThreshold, 'red', 'OUT (bottom)', 'bottom');
            createViewportLine(video, outThreshold, 'orange', 'OUT (top)', 'top');
          }
        }

      });


      function buildThresholdArray(inT, outT) {
        const set = new Set([0, 1, inT, outT]);
        return Array.from(set).sort((a, b) => a - b);
      }


      // ===== 建立 viewport 線 =====
      // direction: "bottom" or "top"
      function createViewportLine(video, threshold, color, label, direction) {

        const line = document.createElement('div');

        line.style.position = 'fixed';
        line.style.left = 0;
        line.style.width = '100%';
        line.style.height = '2px';
        line.style.background = color;
        line.style.zIndex = 99999;
        line.style.pointerEvents = 'none';

        const tag = document.createElement('span');
        tag.textContent = `${label}: ${threshold}`;
        tag.style.position = 'absolute';
        tag.style.right = '10px';
        tag.style.top = '-18px';
        tag.style.fontSize = '12px';
        tag.style.color = color;

        line.appendChild(tag);
        document.body.appendChild(line);

        function update() {

          const rect = video.getBoundingClientRect();
          let triggerY;

          if (direction === 'bottom') {
            // 從底部往上算
            triggerY = rect.top + (rect.height * (1 - threshold));
          } else {
            // 從頂部往下算
            triggerY = rect.top + (rect.height * threshold);
          }

          line.style.top = triggerY + 'px';
        }

        update();
        window.addEventListener('scroll', update);
        window.addEventListener('resize', update);
      }
