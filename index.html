    </div>
    <script>
      const videos = document.querySelectorAll('.anim');

      videos.forEach(video => {

        const inThreshold  = parseFloat(video.dataset.in)  || 0.6;
        const outThreshold = parseFloat(video.dataset.out) || 0;
        const delay        = parseInt(video.dataset.delay) || 0;

        let timer = null;
        let playing = false;

        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {

            const ratio = entry.intersectionRatio;

            // ===== 滑入播放 =====
            if (ratio >= inThreshold && !playing) {

              clearTimeout(timer);

              timer = setTimeout(() => {
                video.play();
                playing = true;
              }, delay);
            }

            // ===== 滑出初始化 =====
            if (ratio <= outThreshold && playing) {

              clearTimeout(timer);

              video.pause();
              video.currentTime = 0;
              playing = false;
            }

          });
        }, {
          threshold: buildThresholdArray(inThreshold, outThreshold)
        });

        observer.observe(video);

      });


      /* 建立 threshold 陣列（避免漏掉門檻） */
      function buildThresholdArray(inT, outT) {
        const set = new Set([0, 1, inT, outT]);
        return Array.from(set).sort((a, b) => a - b);
      }
    </script>
